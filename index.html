<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar Inventory • Uno's Newtown Square</title>
<style>
  :root { --bg:#0f1115; --card:#181b22; --accent:#c2410f; --accent-light:#f97316; --text:#e5e7eb; --text-muted:#9ca3af; --border:#272b34; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; font-size:15px; padding-bottom:80px; }
  .header { background:#181b22; border-bottom:1px solid var(--border); padding:14px 16px; position:sticky; top:0; z-index:100; }
  .title { font-size:20px; font-weight:700; }
  .subtitle { color:var(--text-muted); font-size:12px; margin-top:2px; }
  .stats { display:flex; gap:20px; margin-top:8px; }
  .stat-value { font-size:18px; font-weight:700; color:var(--accent-light); }
  .stat-label { font-size:10px; color:var(--text-muted); text-transform:uppercase; }
  .tabs { display:flex; overflow-x:auto; gap:4px; padding:10px 16px; background:#181b22; border-bottom:1px solid var(--border); position:sticky; top:88px; z-index:99; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex-shrink:0; padding:7px 14px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--card); color:var(--text-muted); white-space:nowrap; }
  .tab.active { background:var(--accent); border-color:var(--accent); color:white; }
  .controls { padding:10px 16px; display:flex; gap:8px; flex-wrap:wrap; }
  .search-input { flex:1; min-width:180px; background:var(--card); border:1px solid var(--border); color:var(--text); padding:9px 14px; border-radius:8px; font-size:15px; outline:none; }
  .search-input:focus { border-color:var(--accent); }
  .btn { background:var(--card); border:1px solid var(--border); color:var(--text); padding:9px 14px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
  .btn-primary { background:var(--accent); border-color:var(--accent); color:white; }
  .page { display:none; padding:0 16px; }
  .page.active { display:block; }
  .section { margin-top:20px; }
  .section-title { font-size:12px; font-weight:700; color:var(--accent-light); text-transform:uppercase; letter-spacing:0.5px; padding:0 4px 8px; border-bottom:1px solid var(--border); margin-bottom:6px; display:flex; justify-content:space-between; }
  .item-row { display:flex; align-items:center; gap:10px; padding:10px; border-bottom:1px solid var(--border); background:var(--card); border-radius:8px; margin-bottom:4px; }
  .item-info { flex:1; min-width:0; }
  .item-name { font-weight:600; font-size:14px; }
  .item-code { font-size:11px; color:var(--text-muted); font-family:monospace; }
  .size-badge { font-size:10px; padding:1px 6px; background:#272b34; border-radius:4px; margin-left:6px; color:#aaa; }
  .count-controls { display:flex; align-items:center; gap:4px; flex-shrink:0; }
  .qty-btn { background:#111317; border:1px solid var(--border); color:var(--text); width:36px; height:36px; border-radius:8px; font-size:18px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; }
  .qty-btn:active { background:var(--accent); border-color:var(--accent); color:white; }
  .count-display { width:58px; text-align:center; font-size:17px; font-weight:700; color:var(--accent-light); background:#111317; border:1px solid var(--border); border-radius:8px; padding:6px 2px; cursor:pointer; }
  .count-display.zero { color:var(--text-muted); }
  .progress-bar { position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; gap:12px; z-index:50; }
  .progress-text { font-size:12px; color:var(--text-muted); white-space:nowrap; }
  .progress-track { flex:1; height:6px; background:#272b34; border-radius:999px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(to right,var(--accent),var(--accent-light)); transition:width 0.3s; }
  .hidden { display:none !important; }
  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#22c55e; color:white; padding:10px 20px; border-radius:8px; font-size:14px; z-index:9999; }
  .history-item { background:var(--card); padding:12px; border-radius:8px; margin-bottom:8px; border:1px solid var(--border); }
  .history-date { font-weight:600; color:var(--accent-light); }
  .ordering-item { display:flex; justify-content:space-between; align-items:center; padding:10px; background:var(--card); border-radius:8px; margin-bottom:6px; }
  @media print {
    body { background:white !important; color:#111 !important; }
    .header, .tabs, .controls, .progress-bar, .qty-btn, .toast { display:none !important; }
    .page { display:block !important; }
    .item-row { background:white; border:1px solid #ddd; margin-bottom:6px; }
    .item-name { color:#111; }
    .item-code { color:#555; }
    .count-display { background:white; border:1px solid #ccc; color:#111; font-size:14px; }
    .section-title { color:#c2410f; border-bottom:2px solid #c2410f; }
  }
</style>
</head>

<div class="header">

  <div class="subtitle">Uno's Newtown Square</div>
  <div class="stats">

    <div><div class="stat-value" id="items-counted">0/0</div><div class="stat-label">Counted</div></div>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="controls">

  <button class="btn" onclick="resetAll()">Reset All</button>
  <button class="btn btn-primary" onclick="exportCSV()">Export CSV</button>
  <button class="btn" onclick="printWhite()">Print (White)</button>
</div>

<div id="pages"></div>

<!-- History Tab Content -->
<div id="page-history" class="page">
  <div style="padding:16px;">
    <button class="btn btn-primary" onclick="saveSnapshot()" style="margin-bottom:16px; width:100%;">Save Current Count as Snapshot</button>
    <div id="history-list"></div>
  </div>
</div>

<!-- Ordering Tab Content -->
<div id="page-ordering" class="page">
  <div style="padding:16px;">

    <div id="ordering-list"></div>
  </div>
</div>

<div class="progress-bar">
  <div class="progress-text" id="progress-text">0 of 0 items</div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

// ==================== STATE ====================
let state = {};
let currentPage = 'liquor';
let history = [];

function loadState() {
  try {
    state = JSON.parse(localStorage.getItem('uno_bar_v4') || '{}');
    history = JSON.parse(localStorage.getItem('uno_bar_history') || '[]');
  } catch(e) { state = {}; history = []; }
}

function saveState() {
  localStorage.setItem('uno_bar_v4', JSON.stringify(state));
}

function saveHistory() {
  localStorage.setItem('uno_bar_history', JSON.stringify(history));
}

function getCount(id, size = '750') {
  const key = size === '1500' ? `${id}_1500` : id;
  return parseFloat(state[key] || 0);
}

function setCount(id, val, size = '750') {
  val = Math.max(0, Math.round(parseFloat(val) * 10) / 10); // round to 0.1
  const key = size === '1500' ? `${id}_1500` : id;
  state[key] = val;
  saveState();

  const disp = document.getElementById(`disp-${id}-${size}`);
  if (disp) {
    disp.textContent = val;
    disp.className = `count-display${val === 0 ? ' zero' : ''}`;
  }
  updateTotals();
  renderOrderingList();
}

function updateTotals() {
  let bottles = 0, counted = 0, total = 0;

  PAGES.forEach(page => {
    Object.values(page.sections).forEach(items => {
      items.forEach(item => {
        const has1500 = page.id === 'wine';
        total += has1500 ? 2 : 1;

        const c750 = getCount(item.id, '750');
        bottles += c750;
        if (c750 > 0) counted++;

        if (has1500) {
          const c1500 = getCount(item.id, '1500');
          bottles += c1500;
          if (c1500 > 0) counted++;
        }
      });
    });
  });

  document.getElementById('total-bottles').textContent = bottles;
  document.getElementById('items-counted').textContent = `${counted}/${total}`;

  const pct = total > 0 ? Math.round((counted / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = `${pct}%`;
  document.getElementById('progress-text').textContent = `${counted} of ${total} items • ${bottles} total bottles`;
}

// ==================== RENDER ====================
function render() {
  const tabsEl = document.getElementById('tabs');
  const pagesEl = document.getElementById('pages');
  tabsEl.innerHTML = '';
  pagesEl.innerHTML = '';

  // Main category tabs
  PAGES.forEach((page, i) => {
    const tab = document.createElement('div');
    tab.className = `tab${i === 0 ? ' active' : ''}`;
    tab.id = `tab-${page.id}`;
    tab.textContent = page.label;
    tab.onclick = () => switchPage(page.id);
    tabsEl.appendChild(tab);

    const pageDiv = document.createElement('div');
    pageDiv.className = `page${i === 0 ? ' active' : ''}`;
    pageDiv.id = `page-${page.id}`;

    Object.entries(page.sections).forEach(([catName, items]) => {
      const sec = document.createElement('div');
      sec.className = 'section';

      const hdr = document.createElement('div');
      hdr.className = 'section-title';
      hdr.innerHTML = `<span>${catName}</span><span style="color:#666;font-weight:400">${items.length}</span>`;
      sec.appendChild(hdr);

      items.forEach(item => {
        const isWine = page.id === 'wine';
        const row = document.createElement('div');
        row.className = 'item-row';
        row.dataset.name = item.name.toLowerCase();
        row.dataset.code = item.code.toLowerCase();

        let html = `
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-code">${item.code || '—'}</div>
          </div>
          <div class="count-controls">
        `;

        if (isWine) {
          // 750ml
          html += `
            <div style="display:flex; flex-direction:column; align-items:center; margin-right:8px;">
              <div style="font-size:10px; color:#888;">750ml</div>
              <div style="display:flex; gap:3px;">
                <button class="qty-btn" onclick="setCount('${item.id}', getCount('${item.id}', '750') - 0.2, '750')">−</button>
                <div class="count-display${getCount(item.id, '750') === 0 ? ' zero' : ''}" id="disp-${item.id}-750" onclick="promptCount('${item.id}', '750')">${getCount(item.id, '750')}</div>
                <button class="qty-btn" onclick="setCount('${item.id}', getCount('${item.id}', '750') + 0.2, '750')">+</button>
              </div>
            </div>
            <!-- 1.5L -->
            <div style="display:flex; flex-direction:column; align-items:center;">
              <div style="font-size:10px; color:#888;">1.5L</div>
              <div style="display:flex; gap:3px;">
                <button class="qty-btn" onclick="setCount('${item.id}', getCount('${item.id}', '1500') - 0.2, '1500')">−</button>
                <div class="count-display${getCount(item.id, '1500') === 0 ? ' zero' : ''}" id="disp-${item.id}-1500" onclick="promptCount('${item.id}', '1500')">${getCount(item.id, '1500')}</div>
                <button class="qty-btn" onclick="setCount('${item.id}', getCount('${item.id}', '1500') + 0.2, '1500')">+</button>
              </div>
            </div>
          `;
        } else {
          // Liquor, Beer, Syrups - single count with 0.2
          html += `
            <button class="qty-btn" onclick="setCount('${item.id}', getCount('${item.id}') - 0.2)">−</button>
            <div class="count-display${getCount(item.id) === 0 ? ' zero' : ''}" id="disp-${item.id}" onclick="promptCount('${item.id}')">${getCount(item.id)}</div>
            <button class="qty-btn" onclick="setCount('${item.id}', getCount('${item.id}') + 0.2)">+</button>
          `;
        }

        html += `</div>`;
        row.innerHTML = html;
        sec.appendChild(row);
      });

      pageDiv.appendChild(sec);
    });

    pagesEl.appendChild(pageDiv);
  });

  // Add History and Ordering tabs
  addExtraTabs(tabsEl, pagesEl);

  updateTotals();
  renderHistory();
  renderOrderingList();
}

function addExtraTabs(tabsEl, pagesEl) {
  // History Tab
  const historyTab = document.createElement('div');
  historyTab.className = 'tab';
  historyTab.id = 'tab-history';
  historyTab.textContent = '📜 History';
  historyTab.onclick = () => switchPage('history');
  tabsEl.appendChild(historyTab);

  // Ordering Tab
  const orderingTab = document.createElement('div');
  orderingTab.className = 'tab';
  orderingTab.id = 'tab-ordering';
  orderingTab.textContent = '🛒 Ordering';
  orderingTab.onclick = () => switchPage('ordering');
  tabsEl.appendChild(orderingTab);
}

function switchPage(pageId) {
  currentPage = pageId;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  if (pageId === 'history' || pageId === 'ordering') {
    const target = document.getElementById(`page-${pageId}`);
    if (target) target.classList.add('active');
    const tab = document.getElementById(`tab-${pageId}`);
    if (tab) tab.classList.add('active');
  } else {
    const pg = document.getElementById('page-' + pageId);
    if (pg) pg.classList.add('active');
    const tab = document.getElementById('tab-' + pageId);
    if (tab) tab.classList.add('active');
  }
}

// ==================== HELPER FUNCTIONS ====================
function promptCount(id, size = '750') {
  const current = getCount(id, size);
  const val = prompt(`Enter count for ${size}ml:`, current);
  if (val !== null) {
    setCount(id, parseFloat(val), size);
  }
}

function filterItems() {
  const term = document.getElementById('search').value.toLowerCase().trim();
  document.querySelectorAll('.item-row').forEach(row => {
    const match = !term || row.dataset.name.includes(term) || row.dataset.code.includes(term);
    row.style.display = match ? '' : 'none';
  });
}

function resetAll() {
  if (!confirm('Reset ALL counts to zero?')) return;
  state = {};
  saveState();
  location.reload();
}

function exportCSV() {
  let csv = 'Category,Item,Code,Size,Count\n';
  PAGES.forEach(page => {
    Object.entries(page.sections).forEach(([cat, items]) => {
      items.forEach(item => {
        if (page.id === 'wine') {
          csv += `"${cat}","${item.name}","${item.code}","750ml",${getCount(item.id, '750')}\n`;
          csv += `"${cat}","${item.name}","${item.code}","1.5L",${getCount(item.id, '1500')}\n`;
        } else {
          csv += `"${cat}","${item.name}","${item.code}","750ml",${getCount(item.id)}\n`;
        }
      });
    });
  });

  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `Bar_Inventory_${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function printWhite() {
  window.print();
}

// ==================== HISTORY ====================
function saveSnapshot() {
  const snapshot = {
    date: new Date().toISOString(),
    counts: { ...state }
  };
  history.unshift(snapshot);
  if (history.length > 20) history.pop(); // keep last 20
  saveHistory();
  renderHistory();
  showToast('Snapshot saved!');
}

function renderHistory() {
  const container = document.getElementById('history-list');
  if (!container) return;

  container.innerHTML = '';

  if (history.length === 0) {
    container.innerHTML = '<p style="color:#888; padding:20px;">No history yet. Click "Save Current Count" to create your first snapshot.</p>';
    return;
  }

  history.forEach((snap, index) => {
    const div = document.createElement('div');
    div.className = 'history-item';
    const date = new Date(snap.date).toLocaleString();

    let total = 0;
    Object.values(snap.counts).forEach(v => total += parseFloat(v) || 0);

    div.innerHTML = `
      <div class="history-date">${date}</div>
      <div style="margin:6px 0; font-size:13px;">Total bottles counted: <strong>${total}</strong></div>
      <button class="btn" onclick="loadSnapshot(${index})">Load This Count</button>
    `;
    container.appendChild(div);
  });
}

function loadSnapshot(index) {
  if (!confirm('Load this historical count? Current counts will be replaced.')) return;
  state = { ...history[index].counts };
  saveState();
  location.reload();
}

// ==================== ORDERING LIST ====================
function renderOrderingList() {
  const container = document.getElementById('ordering-list');
  if (!container) return;

  container.innerHTML = '';
  let hasItems = false;

  PAGES.forEach(page => {
    Object.entries(page.sections).forEach(([cat, items]) => {
      items.forEach(item => {
        const c750 = getCount(item.id, '750');
        const c1500 = page.id === 'wine' ? getCount(item.id, '1500') : 0;

        if (c750 === 0 && (page.id !== 'wine' || c1500 === 0)) {
          hasItems = true;
          const div = document.createElement('div');
          div.className = 'ordering-item';
          div.innerHTML = `
            <div>
              <strong>${item.name}</strong><br>
              <span style="font-size:12px; color:#888;">${item.code || ''}</span>
            </div>
            <button class="btn" onclick="markAsOrdered('${item.id}', '${page.id}')">Mark Ordered</button>
          `;
          container.appendChild(div);
        }
      });
    });
  });

  if (!hasItems) {
    container.innerHTML = '<p style="color:#22c55e; padding:20px;">All items are stocked! 🎉</p>';
  }
}

function markAsOrdered(id, pageId) {
  if (confirm('Mark this item as ordered? This will set count to 1.')) {
    setCount(id, 1, '750');
    if (pageId === 'wine') setCount(id, 0, '1500');
    renderOrderingList();
    updateTotals();
  }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2200);
}

// ==================== INIT ====================
loadState();
render();
</script>
