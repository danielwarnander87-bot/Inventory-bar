<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar Inventory • Uno's Newtown Square</title>
<style>
  :root { --bg:#0f1115; --card:#181b22; --accent:#c2410f; --accent-light:#f97316; --text:#e5e7eb; --text-muted:#9ca3af; --border:#272b34; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; font-size:15px; padding-bottom:80px; }
  .header { background:#181b22; border-bottom:1px solid var(--border); padding:14px 16px; position:sticky; top:0; z-index:100; }
  .title { font-size:20px; font-weight:700; }
  .subtitle { color:var(--text-muted); font-size:12px; margin-top:2px; }
  .stats { display:flex; gap:20px; margin-top:8px; }
  .stat-value { font-size:18px; font-weight:700; color:var(--accent-light); }
  .stat-label { font-size:10px; color:var(--text-muted); text-transform:uppercase; }
  /* TABS */
  .tabs { display:flex; overflow-x:auto; gap:4px; padding:10px 16px; background:#181b22; border-bottom:1px solid var(--border); position:sticky; top:88px; z-index:99; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex-shrink:0; padding:7px 14px; border-radius:20px; font-size:13px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:var(--card); color:var(--text-muted); white-space:nowrap; }
  .tab.active { background:var(--accent); border-color:var(--accent); color:white; }
  /* CONTROLS */
  .controls { padding:10px 16px; display:flex; gap:8px; flex-wrap:wrap; }
  .search-input { flex:1; min-width:180px; background:var(--card); border:1px solid var(--border); color:var(--text); padding:9px 14px; border-radius:8px; font-size:15px; outline:none; }
  .search-input:focus { border-color:var(--accent); }
  .btn { background:var(--card); border:1px solid var(--border); color:var(--text); padding:9px 14px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; }
  .btn-primary { background:var(--accent); border-color:var(--accent); color:white; }
  /* ITEMS */
  .page { display:none; padding:0 16px; }
  .page.active { display:block; }
  .section { margin-top:20px; }
  .section-title { font-size:12px; font-weight:700; color:var(--accent-light); text-transform:uppercase; letter-spacing:0.5px; padding:0 4px 8px; border-bottom:1px solid var(--border); margin-bottom:6px; display:flex; justify-content:space-between; }
  .item-row { display:flex; align-items:center; gap:10px; padding:10px 10px; border-bottom:1px solid var(--border); background:var(--card); border-radius:8px; margin-bottom:4px; }
  .item-info { flex:1; min-width:0; }
  .item-name { font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .item-code { font-size:11px; color:var(--text-muted); font-family:monospace; }
  .count-controls { display:flex; align-items:center; gap:6px; flex-shrink:0; }
  .qty-btn { background:#111317; border:1px solid var(--border); color:var(--text); width:38px; height:38px; border-radius:8px; font-size:18px; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; touch-action:manipulation; user-select:none; }
  .qty-btn:active { background:var(--accent); border-color:var(--accent); color:white; }
  .count-display { width:54px; text-align:center; font-size:18px; font-weight:700; color:var(--accent-light); background:#111317; border:1px solid var(--border); border-radius:8px; padding:6px 4px; cursor:pointer; user-select:none; }
  .count-display.zero { color:var(--text-muted); }
  /* PROGRESS */
  .progress-bar { position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--border); padding:10px 16px; display:flex; align-items:center; gap:12px; z-index:50; }
  .progress-text { font-size:12px; color:var(--text-muted); white-space:nowrap; }
  .progress-track { flex:1; height:6px; background:#272b34; border-radius:999px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(to right,var(--accent),var(--accent-light)); transition:width 0.3s; }
  .hidden { display:none !important; }
  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#22c55e; color:white; padding:10px 20px; border-radius:8px; font-size:14px; z-index:9999; pointer-events:none; }
  @media print {
    .header,.tabs,.controls,.progress-bar,.qty-btn { display:none!important; }
    .page { display:block!important; }
    body { background:white; color:#111; padding:20px; }
    .item-name { color:#111; }
    .item-code { color:#555; }
    .item-row { background:white; border-bottom:1px solid #ddd; border-radius:0; }
    .count-display { background:white; border:1px solid #ccc; color:#111; font-size:14px; width:40px; height:32px; }
    .section-title { color:#c2410f; }
  }
</style>
</head>

let state = {};
let currentPage = 'liquor';

function loadState() {
  try { state = JSON.parse(localStorage.getItem('uno_bar_v3') || '{}'); } catch(e) { state = {}; }
}
function saveState() {
  try { localStorage.setItem('uno_bar_v3', JSON.stringify(state)); } catch(e) {}
}
function getCount(id) { return parseInt(state[id] || 0); }
function setCount(id, val) {
  val = Math.max(0, parseInt(val) || 0);
  state[id] = val;
  saveState();
  const disp = document.getElementById('disp-' + id);
  if (disp) { disp.textContent = val; disp.className = 'count-display' + (val === 0 ? ' zero' : ''); }
  updateTotals();
}

function updateTotals() {
  let bottles = 0, counted = 0, total = 0;
  PAGES.forEach(page => {
    Object.values(page.sections).forEach(items => {
      items.forEach(item => {
        total++;
        const c = getCount(item.id);
        bottles += c;
        if (c > 0) counted++;
      });
    });
  });
  document.getElementById('total-bottles').textContent = bottles;
  document.getElementById('items-counted').textContent = counted + '/' + total;
  const pct = total > 0 ? Math.round(counted/total*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = counted + ' of ' + total + ' items counted • ' + bottles + ' total';
}

function switchPage(pageId) {
  currentPage = pageId;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const pg = document.getElementById('page-' + pageId);
  if (pg) pg.classList.add('active');
  const tab = document.getElementById('tab-' + pageId);
  if (tab) tab.classList.add('active');
  document.getElementById('search').value = '';
  filterItems();
}

function filterItems() {
  const term = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.item-row').forEach(row => {
    const match = !term || row.dataset.name.includes(term) || row.dataset.code.includes(term);
    row.classList.toggle('hidden', !match);
    if (term && match) row.closest('.page').classList.add('active');
  });
  if (term) {
    document.querySelectorAll('.page').forEach(p => {
      const visible = p.querySelectorAll('.item-row:not(.hidden)').length;
      p.style.display = visible > 0 ? 'block' : 'none';
    });
  } else {
    document.querySelectorAll('.page').forEach(p => { p.style.display = ''; });
    switchPage(currentPage);
  }
}

function resetAll() {
  if (!confirm('Reset ALL counts to zero?')) return;
  state = {}; saveState();
  document.querySelectorAll('.count-display').forEach(d => { d.textContent = '0'; d.className = 'count-display zero'; });
  updateTotals();
}

function exportCSV() {
  let csv = 'Page,Category,Item Name,Code,Count\n';
  PAGES.forEach(page => {
    Object.entries(page.sections).forEach(([cat, items]) => {
      items.forEach(item => {
        csv += '"' + page.label.replace(/[^a-zA-Z ]/g,'').trim() + '","' + cat + '","' + item.name + '","' + item.code + '",' + getCount(item.id) + '\n';
      });
    });
  });
  try {
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'Bar_Inventory_' + new Date().toISOString().slice(0,10) + '.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('CSV exported!');
  } catch(e) { alert('Export blocked. Try Safari.'); }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 2000);
}

function promptCount(id) {
  const val = prompt('Enter count:', getCount(id));
  if (val !== null) setCount(id, val);
}

function render() {
  const tabsEl = document.getElementById('tabs');
  const pagesEl = document.getElementById('pages');
  tabsEl.innerHTML = ''; pagesEl.innerHTML = '';

  PAGES.forEach((page, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (i === 0 ? ' active' : '');
    tab.id = 'tab-' + page.id;
    tab.textContent = page.label;
    tab.onclick = () => switchPage(page.id);
    tabsEl.appendChild(tab);

    const pageDiv = document.createElement('div');
    pageDiv.className = 'page' + (i === 0 ? ' active' : '');
    pageDiv.id = 'page-' + page.id;

    Object.entries(page.sections).forEach(([catName, items]) => {
      const sec = document.createElement('div');
      sec.className = 'section';
      const hdr = document.createElement('div');
      hdr.className = 'section-title';
      hdr.innerHTML = '<span>' + catName + '</span><span style="color:var(--text-muted);font-weight:400">' + items.length + '</span>';
      sec.appendChild(hdr);

      items.forEach(item => {
        const c = getCount(item.id);
        const row = document.createElement('div');
        row.className = 'item-row';
        row.dataset.name = item.name.toLowerCase();
        row.dataset.code = item.code.toLowerCase();
        row.innerHTML = `
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-code">${item.code || '—'}</div>
          </div>
          <div class="count-controls">
            <button class="qty-btn" onclick="setCount('${item.id}',getCount('${item.id}')-1)">−</button>
            <div class="count-display${c===0?' zero':''}" id="disp-${item.id}" onclick="promptCount('${item.id}')">${c}</div>
            <button class="qty-btn" onclick="setCount('${item.id}',getCount('${item.id}')+1)">+</button>
          </div>`;
        sec.appendChild(row);
      });
      pageDiv.appendChild(sec);
    });
    pagesEl.appendChild(pageDiv);
  });
  updateTotals();
}

loadState();
render();
</script>
</body>
</html>
