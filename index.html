<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liquor Room Inventory Counter</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #181b22;
    --accent: #c2410f;
    --accent-light: #f97316;
    --text: #e5e7eb;
    --text-muted: #9ca3af;
    --border: #272b34;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; font-size: 15px; padding-bottom: 80px; }
  .header { background: #181b22; border-bottom: 1px solid var(--border); padding: 16px 20px; position: sticky; top: 0; z-index: 100; }
  .title { font-size: 22px; font-weight: 700; }
  .subtitle { color: var(--text-muted); font-size: 13px; margin-top: 2px; }
  .stats { display: flex; gap: 20px; margin-top: 10px; }
  .stat-value { font-size: 20px; font-weight: 700; color: var(--accent-light); }
  .stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
  .controls { padding: 12px 20px; display: flex; gap: 10px; flex-wrap: wrap; }
  .search-input { flex: 1; min-width: 200px; background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: 8px; font-size: 15px; outline: none; }
  .search-input:focus { border-color: var(--accent); }
  .btn { background: var(--card); border: 1px solid var(--border); color: var(--text); padding: 10px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
  .main { padding: 0 20px; }
  .section { margin-top: 24px; }
  .section-title { font-size: 13px; font-weight: 700; color: var(--accent-light); text-transform: uppercase; letter-spacing: 0.5px; padding: 0 4px 8px; border-bottom: 1px solid var(--border); margin-bottom: 6px; display: flex; justify-content: space-between; }
  .item-row { display: flex; align-items: center; gap: 10px; padding: 10px 8px; border-bottom: 1px solid var(--border); background: var(--card); border-radius: 8px; margin-bottom: 4px; }
  .item-info { flex: 1; }
  .item-name { font-weight: 600; font-size: 14px; }
  .item-code { font-size: 11px; color: var(--text-muted); font-family: monospace; }
  .count-controls { display: flex; align-items: center; gap: 6px; }
  .qty-btn { background: #111317; border: 1px solid var(--border); color: var(--text); width: 36px; height: 36px; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; touch-action: manipulation; }
  .qty-btn:active { background: var(--accent); border-color: var(--accent); color: white; }
  .count-display { width: 52px; text-align: center; font-size: 18px; font-weight: 700; color: var(--accent-light); background: #111317; border: 1px solid var(--border); border-radius: 8px; padding: 6px 4px; cursor: pointer; }
  .count-display.zero { color: var(--text-muted); }
  .progress-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; z-index: 50; }
  .progress-text { font-size: 13px; color: var(--text-muted); white-space: nowrap; }
  .progress-track { flex: 1; height: 6px; background: #272b34; border-radius: 999px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(to right, var(--accent), var(--accent-light)); transition: width 0.3s ease; }
  .hidden { display: none !important; }
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: #22c55e; color: white; padding: 10px 20px; border-radius: 8px; font-size: 14px; z-index: 9999; }
</style>
</head>
<body>

<div class="header">
  <div class="title">Liquor Room Inventory</div>
  <div class="subtitle">Uno's Newtown Square</div>
  <div class="stats">
    <div><div class="stat-value" id="total-bottles">0</div><div class="stat-label">Bottles</div></div>
    <div><div class="stat-value" id="items-counted">0/0</div><div class="stat-label">Items</div></div>
  </div>
</div>

<div class="controls">
  <input type="text" class="search-input" id="search" placeholder="Search item..." oninput="filterItems()">
  <button class="btn" onclick="resetAll()">Reset</button>
  <button class="btn btn-primary" onclick="exportCSV()">Export CSV</button>
</div>

<div class="main" id="main"></div>

<div class="progress-bar">
  <div class="progress-text" id="progress-text">0 of 0 items</div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
</div>

let state = {};

function loadState() {
  try { state = JSON.parse(localStorage.getItem('uno_liquor_v2') || '{}'); } catch(e) { state = {}; }
}

function saveState() {
  try { localStorage.setItem('uno_liquor_v2', JSON.stringify(state)); } catch(e) {}
}

function getCount(id) { return parseInt(state[id] || 0); }

function setCount(id, val) {
  val = Math.max(0, parseInt(val) || 0);
  state[id] = val;
  saveState();
  refreshItem(id);
  updateTotals();
}

function refreshItem(id) {
  const disp = document.getElementById('disp-' + id);
  if (!disp) return;
  const c = getCount(id);
  disp.textContent = c;
  disp.className = 'count-display' + (c === 0 ? ' zero' : '');
}

function updateTotals() {
  let bottles = 0, counted = 0, total = 0;
  Object.keys(ITEMS).forEach(cat => {
    ITEMS[cat].forEach(item => {
      total++;
      const c = getCount(item.id);
      bottles += c;
      if (c > 0) counted++;
    });
  });
  document.getElementById('total-bottles').textContent = bottles;
  document.getElementById('items-counted').textContent = counted + '/' + total;
  const pct = total > 0 ? Math.round(counted/total*100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-text').textContent = counted + ' of ' + total + ' items counted • ' + bottles + ' bottles';
}

function filterItems() {
  const term = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.item-row').forEach(row => {
    const name = row.dataset.name || '';
    const code = row.dataset.code || '';
    row.classList.toggle('hidden', term.length > 0 && !name.includes(term) && !code.includes(term));
  });
}

function resetAll() {
  if (!confirm('Reset ALL counts to zero?')) return;
  state = {};
  saveState();
  document.querySelectorAll('.count-display').forEach(d => { d.textContent = '0'; d.className = 'count-display zero'; });
  updateTotals();
}

function exportCSV() {
  let csv = 'Category,Item Name,Code,Count\n';
  Object.keys(ITEMS).forEach(cat => {
    ITEMS[cat].forEach(item => {
      csv += '"' + cat + '","' + item.name + '","' + item.code + '",' + getCount(item.id) + '\n';
    });
  });
  try {
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'Liquor_Inventory_' + new Date().toISOString().slice(0,10) + '.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('CSV exported!');
  } catch(e) {
    alert('Export blocked by browser. Try opening in Safari.');
  }
}

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 2000);
}

function render() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  Object.keys(ITEMS).forEach(cat => {
    const sec = document.createElement('div');
    sec.className = 'section';
    const hdr = document.createElement('div');
    hdr.className = 'section-title';
    hdr.innerHTML = '<span>' + cat + '</span><span style="color:var(--text-muted);font-weight:400">' + ITEMS[cat].length + ' items</span>';
    sec.appendChild(hdr);
    ITEMS[cat].forEach(item => {
      const row = document.createElement('div');
      row.className = 'item-row';
      row.dataset.name = item.name.toLowerCase();
      row.dataset.code = item.code.toLowerCase();
      const c = getCount(item.id);
      row.innerHTML = `
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-code">${item.code || '—'}</div>
        </div>
        <div class="count-controls">
          <button class="qty-btn" ontouchstart="setCount('${item.id}', getCount('${item.id}')-1)" onclick="setCount('${item.id}', getCount('${item.id}')-1)">−</button>
          <div class="count-display${c===0?' zero':''}" id="disp-${item.id}" onclick="promptCount('${item.id}')">${c}</div>
          <button class="qty-btn" ontouchstart="setCount('${item.id}', getCount('${item.id}')+1)" onclick="setCount('${item.id}', getCount('${item.id}')+1)">+</button>
        </div>`;
      sec.appendChild(row);
    });
    main.appendChild(sec);
  });
  updateTotals();
}

function promptCount(id) {
  const current = getCount(id);
  const val = prompt('Enter count:', current);
  if (val !== null) setCount(id, val);
}

loadState();
render();
</script>
</body>
</html>
