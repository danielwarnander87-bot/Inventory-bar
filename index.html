<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bar Inventory • Uno's</title>
<style>
  :root {
    --bg:#0a0a0f; --card:#12121a; --border:#1e1e2e; --text:#f0f0ff; --muted:#6060a0;
    --neon-green:#39ff14; --neon-pink:#ff2d78; --neon-yellow:#fff01f;
    --neon-blue:#00f5ff; --neon-orange:#ff6b00; --neon-purple:#bf00ff;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; font-size:15px; padding-bottom:80px; }

  .header { background:#080810; border-bottom:2px solid var(--neon-purple); padding:12px 16px; position:sticky; top:0; z-index:100; box-shadow:0 0 20px rgba(191,0,255,0.4); }
  .title { font-size:20px; font-weight:900; background:linear-gradient(90deg,var(--neon-yellow),var(--neon-pink),var(--neon-blue)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .subtitle { color:var(--muted); font-size:11px; margin-top:1px; }
  .stats { display:flex; gap:16px; margin-top:8px; }
  .stat-value { font-size:18px; font-weight:800; color:var(--neon-green); text-shadow:0 0 10px var(--neon-green); }
  .stat-label { font-size:10px; color:var(--muted); text-transform:uppercase; }

  .tabs { display:flex; overflow-x:auto; gap:6px; padding:10px 12px; background:#080810; border-bottom:1px solid var(--border); position:sticky; top:85px; z-index:99; scrollbar-width:none; }
  .tabs::-webkit-scrollbar { display:none; }
  .tab { flex-shrink:0; padding:7px 12px; border-radius:20px; font-size:11px; font-weight:800; cursor:pointer; border:2px solid transparent; background:var(--card); color:var(--muted); white-space:nowrap; text-transform:uppercase; letter-spacing:0.5px; }
  .tab[data-page="bar"].active     { background:#1a1500; border-color:var(--neon-yellow); color:var(--neon-yellow); box-shadow:0 0 12px rgba(255,240,31,0.5); }
  .tab[data-page="room2"].active   { background:#1a0010; border-color:var(--neon-pink);   color:var(--neon-pink);   box-shadow:0 0 12px rgba(255,45,120,0.5); }
  .tab[data-page="wine"].active    { background:#001a1a; border-color:var(--neon-blue);   color:var(--neon-blue);   box-shadow:0 0 12px rgba(0,245,255,0.5); }
  .tab[data-page="beer"].active    { background:#001a00; border-color:var(--neon-green);  color:var(--neon-green);  box-shadow:0 0 12px rgba(57,255,20,0.5); }
  .tab[data-page="syrups"].active  { background:#1a0a00; border-color:var(--neon-orange); color:var(--neon-orange); box-shadow:0 0 12px rgba(255,107,0,0.5); }
  .tab[data-page="history"].active { background:#0d0020; border-color:var(--neon-purple); color:var(--neon-purple); box-shadow:0 0 12px rgba(191,0,255,0.5); }

  .controls { padding:10px 14px; display:flex; gap:8px; flex-wrap:wrap; }
  .search-input { flex:1; min-width:180px; background:var(--card); border:1px solid var(--neon-purple); color:var(--text); padding:9px 14px; border-radius:8px; font-size:15px; outline:none; }
  .search-input:focus { border-color:var(--neon-blue); }
  .btn { background:var(--card); border:1px solid var(--border); color:var(--muted); padding:9px 14px; border-radius:8px; font-size:12px; font-weight:700; cursor:pointer; text-transform:uppercase; letter-spacing:0.5px; }
  .btn-reset  { border-color:#ff0040; color:#ff0040; }
  .btn-export { border-color:var(--neon-green); color:var(--neon-green); box-shadow:0 0 8px rgba(57,255,20,0.2); }
  .btn-print  { border-color:var(--neon-blue); color:var(--neon-blue); }

  .page { display:none; padding:0 14px; }
  .page.active { display:block; }

  .section { margin-top:18px; }
  .section-title { font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:1px; padding:6px 8px; border-radius:6px; margin-bottom:6px; display:flex; justify-content:space-between; align-items:center; }
  .section-title span:last-child { font-weight:400; opacity:0.6; font-size:10px; }

  #page-bar    .section-title { background:rgba(255,240,31,0.08); color:var(--neon-yellow); border-left:3px solid var(--neon-yellow); }
  #page-room2  .section-title { background:rgba(255,45,120,0.08);  color:var(--neon-pink);   border-left:3px solid var(--neon-pink); }
  #page-wine   .section-title { background:rgba(0,245,255,0.08);   color:var(--neon-blue);   border-left:3px solid var(--neon-blue); }
  #page-beer   .section-title { background:rgba(57,255,20,0.08);   color:var(--neon-green);  border-left:3px solid var(--neon-green); }
  #page-syrups .section-title { background:rgba(255,107,0,0.08);   color:var(--neon-orange); border-left:3px solid var(--neon-orange); }
  #page-history .section-title { background:rgba(191,0,255,0.08);  color:var(--neon-purple); border-left:3px solid var(--neon-purple); }

  /* ITEM ROW */
  .item-row { background:var(--card); border-radius:8px; margin-bottom:4px; padding:8px 10px; border:1px solid var(--border); }
  .item-row.counted { background:#0d1a0d; border-color:#1a3a1a; }
  .item-name { font-weight:700; font-size:13px; }
  .item-code { font-size:10px; color:var(--muted); font-family:monospace; margin-bottom:6px; }

  /* COUNTER ROWS */
  .counter-rows { display:flex; flex-direction:column; gap:5px; }
  .counter-row { display:flex; align-items:center; gap:8px; }
  .counter-label { font-size:10px; font-weight:800; text-transform:uppercase; letter-spacing:0.5px; min-width:32px; color:var(--muted); }

  .qty-btn { background:#1a1a2e; border:1px solid var(--border); color:var(--text); width:36px; height:36px; border-radius:8px; font-size:18px; font-weight:900; cursor:pointer; display:flex; align-items:center; justify-content:center; touch-action:manipulation; user-select:none; flex-shrink:0; }
  .qty-btn.minus:active { background:#ff0040; border-color:#ff0040; color:#000; }
  .qty-btn.plus:active  { background:var(--neon-green); border-color:var(--neon-green); color:#000; }

  .qty-btn.fine { width:28px; height:28px; font-size:12px; font-weight:800; color:var(--neon-orange); border-color:#3a2410; }
  .qty-btn.fine:active { background:var(--neon-orange); border-color:var(--neon-orange); color:#000; }

  .count-display { min-width:56px; text-align:center; font-size:17px; font-weight:900; background:#0a0a14; border:1px solid var(--border); border-radius:8px; padding:5px 4px; cursor:pointer; user-select:none; color:var(--neon-green); text-shadow:0 0 8px var(--neon-green); }
  .count-display.zero { color:var(--muted); text-shadow:none; }

  /* Beer row (single counter) */
  .beer-row { display:flex; align-items:center; gap:8px; }

  /* PROGRESS */
  .progress-bar { position:fixed; bottom:0; left:0; right:0; background:#080810; border-top:2px solid var(--neon-purple); padding:10px 16px; display:flex; align-items:center; gap:12px; z-index:50; box-shadow:0 -4px 20px rgba(191,0,255,0.3); }
  .progress-text { font-size:11px; color:var(--muted); white-space:nowrap; }
  .progress-track { flex:1; height:6px; background:#1e1e2e; border-radius:999px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(to right,var(--neon-purple),var(--neon-pink),var(--neon-yellow)); transition:width 0.3s ease; }

  /* HISTORY */
  .history-empty { text-align:center; padding:40px 20px; color:var(--muted); font-size:14px; }

  /* REPORT TAB */
  .report-header { font-size:20px; font-weight:900; color:var(--neon-yellow); text-shadow:0 0 10px rgba(255,240,31,0.4); }
  .report-date { color:var(--muted); font-size:12px; margin-top:2px; }
  .report-grand { font-size:13px; color:var(--neon-green); margin-top:8px; }
  .report-actions { display:flex; gap:8px; margin:14px 0 18px; flex-wrap:wrap; }
  .report-empty { text-align:center; padding:40px 20px; color:var(--muted); font-size:14px; }
  .report-loc { background:var(--card); border:1px solid var(--border); border-radius:10px; margin-bottom:14px; overflow:hidden; }
  .report-loc-hdr { background:rgba(255,240,31,0.1); padding:8px 12px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); }
  .report-loc-name { font-weight:900; font-size:13px; color:var(--neon-yellow); text-transform:uppercase; letter-spacing:0.5px; }
  .report-loc-sub { font-size:11px; color:var(--muted); }
  .report-table { width:100%; font-size:12px; border-collapse:collapse; }
  .report-table th { background:#0a0a14; padding:5px 10px; text-align:left; color:var(--muted); font-size:10px; text-transform:uppercase; border-bottom:1px solid var(--border); }
  .report-table td { padding:4px 10px; border-bottom:1px solid var(--border); }
  .report-table tr:last-child td { border-bottom:none; }
  .report-cat-row td { background:rgba(255,255,255,0.03); font-weight:800; font-size:10px; text-transform:uppercase; color:var(--muted); letter-spacing:0.5px; }
  .snapshot-card { background:var(--card); border:1px solid var(--neon-purple); border-radius:10px; margin-bottom:14px; margin-top:10px; overflow:hidden; }
  .snapshot-header { background:rgba(191,0,255,0.15); padding:10px 14px; display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); }
  .snapshot-date { font-weight:800; font-size:13px; color:var(--neon-purple); }
  .snapshot-total { font-size:12px; color:var(--muted); }
  .snapshot-delete { background:none; border:1px solid #ff0040; color:#ff0040; border-radius:6px; padding:3px 8px; font-size:11px; cursor:pointer; }
  .snapshot-table { width:100%; font-size:12px; border-collapse:collapse; }
  .snapshot-table th { background:#0a0a14; padding:6px 10px; text-align:left; color:var(--muted); font-size:10px; text-transform:uppercase; border-bottom:1px solid var(--border); }
  .snapshot-table td { padding:5px 10px; border-bottom:1px solid var(--border); }
  .snapshot-table tr:last-child td { border-bottom:none; }
  .snapshot-table tr.nonzero td { color:var(--neon-green); }
  .snapshot-table tr.zero td { color:var(--muted); opacity:0.4; }
  .snapshot-toggle { width:100%; background:none; border:none; color:var(--muted); font-size:11px; padding:8px; cursor:pointer; text-align:center; border-top:1px solid var(--border); }

  .hidden { display:none !important; }
  .toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:var(--neon-green); color:#000; padding:10px 20px; border-radius:8px; font-size:13px; font-weight:800; z-index:9999; pointer-events:none; box-shadow:0 0 20px var(--neon-green); text-transform:uppercase; letter-spacing:1px; }

  @media print {
    * { background:white!important; color:black!important; border-color:#ccc!important; text-shadow:none!important; box-shadow:none!important; -webkit-text-fill-color:black!important; }
    .header,.tabs,.controls,.progress-bar,.qty-btn,.report-actions,.no-print { display:none!important; }
    /* Only the tab you're currently viewing prints — no more dumping every category at once */
    body { padding:20px; }
    .item-row { border:1px solid #ddd; margin-bottom:3px; border-radius:4px; }
    .count-display, .beer-input { border:1px solid #999; font-size:13px; min-width:40px; }
    .section-title { border-left:3px solid #333!important; background:#f5f5f5!important; }
    .counter-label { color:#555!important; }
    .item-code { color:#555!important; }

    /* Report tab: dense, minimal-page printout */
    .report-loc { page-break-inside:avoid; margin-bottom:10px; }
    .report-table { font-size:10.5px; }
    .report-table th, .report-table td { padding:2px 5px!important; }
    .report-header { font-size:16px!important; }
  }
</style>
</head>

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {};
let currentPage = 'bar';

function loadState() { try { state = JSON.parse(localStorage.getItem('uno_bar_v5')||'{}'); } catch(e){state={};} }
function saveState() { try { localStorage.setItem('uno_bar_v5', JSON.stringify(state)); } catch(e){} }

// For liquor/wine: store two keys per item: id+"_750" and id+"_ltr" (or "_15")
// For syrup/beer: just id

function getVal(key) { return parseFloat(state[key]||0); }

// For blank/placeholder items (like new keg slots), the real name/code
// the bartender types in gets stored separately under name_<id> / code_<id>
// so the original item definition stays untouched.
function getItemName(item) { return state['name_'+item.id] || item.name; }
function getItemCode(item) { return state['code_'+item.id] || item.code; }
function setItemName(id, val) { state['name_'+id] = val; saveState(); }
function setItemCode(id, val) { state['code_'+id] = val; saveState(); }
function escapeAttr(s) { return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

function setVal(key, val, step) {
  // Only clean up floating-point drift (e.g. 0.30000000000000004) —
  // do NOT snap manually-typed values to the nearest bottle-size multiple.
  // That was silently destroying partial-bottle entries like 0.25 or 2.3.
  val = Math.max(0, val);
  val = Math.round(val * 100) / 100;
  state[key] = val;
  saveState();
  const d = document.getElementById('disp-'+key);
  if(d){
    if(d.tagName === 'INPUT'){
      d.value = val === 0 ? '' : trimZeros(val);
    } else {
      d.textContent = val === 0 ? '0' : trimZeros(val);
    }
    d.classList.toggle('zero', val===0);
  }
  updateCounted(key.split('_')[0]);
  updateTotals();
}

// Shows "3" instead of "3.00", but keeps "2.25" or "0.4" exactly as entered
function trimZeros(n) {
  return parseFloat(n.toFixed(2)).toString();
}

function updateCounted(baseId) {
  const row = document.getElementById('row-'+baseId);
  if(!row) return;
  // check if any sub-key has a value
  const keys = Object.keys(state).filter(k => k.startsWith(baseId) && parseFloat(state[k]) > 0);
  row.className = 'item-row' + (keys.length > 0 ? ' counted' : '');
}

function promptVal(key, step) {
  const cur = getVal(key);
  const val = prompt('Enter value:', cur);
  if(val !== null) setVal(key, parseFloat(val)||0, step);
}

function updateTotals() {
  let total=0, counted=0, items=0;
  const seen = new Set();
  PAGES.forEach(p => Object.values(p.sections).forEach(sec => sec.items.forEach(item => {
    items++;
    let hasVal = false;
    if(sec.type === 'liquor') {
      const v750 = getVal(item.id+'_750'); const vltr = getVal(item.id+'_ltr');
      total += (v750 * 0.75) + (vltr * 1.0); if(v750>0||vltr>0) hasVal=true;
    } else if(sec.type === 'wine') {
      const v750 = getVal(item.id+'_750'); const v15 = getVal(item.id+'_15');
      total += (v750 * 0.75) + (v15 * 1.5); if(v750>0||v15>0) hasVal=true;
    } else {
      const v = getVal(item.id); total += v; if(v>0) hasVal=true;
    }
    if(hasVal) counted++;
  })));
  document.getElementById('total-bottles').textContent = total.toFixed(1);
  document.getElementById('items-counted').textContent = counted+'/'+items;
  const pct = items > 0 ? Math.round(counted/items*100) : 0;
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('progress-text').textContent = counted+' of '+items+' items counted';
}

// ─── HISTORY ─────────────────────────────────────────────────────────────────
function getHistory() { try { return JSON.parse(localStorage.getItem('uno_history_v5')||'[]'); } catch(e){return[];} }
function saveHistory(h) { try { localStorage.setItem('uno_history_v5', JSON.stringify(h)); } catch(e){} }

function buildSnapshot() {
  const rows = [];
  PAGES.forEach(p => Object.entries(p.sections).forEach(([cat, sec]) => sec.items.forEach(item => {
    if(sec.type === 'liquor') {
      const v750 = getVal(item.id+'_750'); const vltr = getVal(item.id+'_ltr');
      if(v750 > 0 || vltr > 0) rows.push({loc:p.label.replace(/[^\w ]/g,'').trim(), cat, name:item.name, code:item.code, val750:v750, valLtr:vltr, total: parseFloat(((v750*0.75)+(vltr*1.0)).toFixed(2))});
    } else if(sec.type === 'wine') {
      const v750 = getVal(item.id+'_750'); const v15 = getVal(item.id+'_15');
      if(v750 > 0 || v15 > 0) rows.push({loc:p.label.replace(/[^\w ]/g,'').trim(), cat, name:item.name, code:item.code, val750:v750, val15:v15, total: parseFloat(((v750*0.75)+(v15*1.5)).toFixed(2))});
    } else {
      const v = getVal(item.id);
      if(v > 0) rows.push({loc:p.label.replace(/[^\w ]/g,'').trim(), cat, name:item.name, code:item.code, total:v});
    }
  })));
  return rows;
}

function saveSnapshot() {
  const rows = buildSnapshot();
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  const timeStr = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const snap = { date: dateStr+' '+timeStr, rows };
  const hist = getHistory();
  hist.unshift(snap);
  if(hist.length > 30) hist.pop();
  saveHistory(hist);

  // also export CSV
  exportCSV(rows, now);

  renderHistory();
  switchPage('history');
  showToast('✅ Saved + Exported!');
}

function exportCSV(rows, now) {
  const d = now || new Date();
  let csv = 'Location,Category,Item Name,Code,750ml (bottles),Liter/1.5L (bottles),Total (Liters)\n';
  rows.forEach(r => {
    csv += '"'+(r.loc||'')+'","'+(r.cat||'')+'","'+r.name+'","'+(r.code||'')+'",'
      +(r.val750 !== undefined ? r.val750 : '')
      +','+(r.valLtr !== undefined ? r.valLtr : r.val15 !== undefined ? r.val15 : '')
      +','+r.total+'\n';
  });
  try {
    const blob = new Blob([csv], {type:'text/csv'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Inventory_'+d.toISOString().slice(0,10)+'_'+d.getHours()+'h'+String(d.getMinutes()).padStart(2,'0')+'.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e){ alert('Export failed — try Safari.'); }
}

function deleteSnapshot(idx) {
  if(!confirm('Delete this snapshot?')) return;
  const hist = getHistory();
  hist.splice(idx, 1);
  saveHistory(hist);
  renderHistory();
}

function renderHistory() {
  const container = document.getElementById('history-content');
  if(!container) return;
  const hist = getHistory();
  if(hist.length === 0) {
    container.innerHTML = '<div class="history-empty">No snapshots yet.<br>Hit "Export + Save" to capture your first count.</div>';
    return;
  }
  container.innerHTML = '';
  hist.forEach((snap, idx) => {
    const card = document.createElement('div');
    card.className = 'snapshot-card';
    const total = snap.rows.reduce((s,r) => s + (parseFloat(r.total)||0), 0);
    card.innerHTML = `
      <div class="snapshot-header">
        <div class="snapshot-date">📅 ${snap.date}</div>
        <div style="display:flex;gap:8px;align-items:center">
          <div class="snapshot-total">${snap.rows.length} items · ${total.toFixed(1)} total</div>
          <button class="snapshot-delete" onclick="deleteSnapshot(${idx})">Delete</button>
        </div>
      </div>
      <div id="snap-body-${idx}" class="hidden">
        <table class="snapshot-table">
          <thead><tr><th>Location</th><th>Item</th><th>Code</th><th>750ml (btl)</th><th>Ltr/1.5L (btl)</th><th>Total (L)</th></tr></thead>
          <tbody>
            ${snap.rows.map(r=>`<tr class="${parseFloat(r.total)>0?'nonzero':'zero'}">
              <td>${r.loc||''}</td>
              <td>${r.name}</td>
              <td>${r.code||'—'}</td>
              <td>${r.val750 !== undefined ? r.val750 : '—'}</td>
              <td>${r.valLtr !== undefined ? r.valLtr : r.val15 !== undefined ? r.val15 : '—'}</td>
              <td>${r.total}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <button class="snapshot-toggle" onclick="toggleSnap(${idx})">▼ Show details</button>`;
    container.appendChild(card);
  });
}

function toggleSnap(idx) {
  const body = document.getElementById('snap-body-'+idx);
  const btn = body.nextElementSibling;
  const hidden = body.classList.toggle('hidden');
  btn.textContent = hidden ? '▼ Show details' : '▲ Hide details';
}

// ─── REPORT (final consolidated, print-ready sheet) ──────────────────────────
function formatRowCounts(r) {
  // Liquor/wine rows have val750 + valLtr/val15; syrup/beer rows just have total
  if (r.val750 !== undefined) {
    const second = r.valLtr !== undefined ? r.valLtr : r.val15;
    const secondLabel = r.valLtr !== undefined ? 'Ltr' : '1.5L';
    const parts = [];
    if (r.val750 > 0) parts.push(trimZeros(r.val750) + ' × 750ml');
    if (second > 0) parts.push(trimZeros(second) + ' × ' + secondLabel);
    return parts.join(' + ') || '—';
  }
  return trimZeros(r.total);
}

function renderReport() {
  const container = document.getElementById('report-content');
  if (!container) return;

  const rows = buildSnapshot(); // already grouped-ready: {loc, cat, name, code, total, ...}
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  document.getElementById('report-date').textContent = dateStr;

  if (rows.length === 0) {
    container.innerHTML = '<div class="report-empty">No counts yet.<br>Start counting on any tab — this report fills in as you go.</div>';
    document.getElementById('report-grand').textContent = '';
    return;
  }

  // Group by location, then by category, preserving first-seen order
  const byLoc = {};
  const locOrder = [];
  rows.forEach(r => {
    if (!byLoc[r.loc]) { byLoc[r.loc] = {}; locOrder.push(r.loc); }
    if (!byLoc[r.loc][r.cat]) byLoc[r.loc][r.cat] = [];
    byLoc[r.loc][r.cat].push(r);
  });

  let grandTotal = 0;
  let html = '';
  locOrder.forEach(loc => {
    let locTotal = 0;
    let bodyRows = '';
    Object.entries(byLoc[loc]).forEach(([cat, items]) => {
      bodyRows += `<tr class="report-cat-row"><td colspan="3">${cat}</td></tr>`;
      items.forEach(r => {
        locTotal += (parseFloat(r.total)||0);
        bodyRows += `<tr>
          <td>${r.name}</td>
          <td style="color:var(--muted);font-family:monospace;font-size:10px;">${r.code||'—'}</td>
          <td style="text-align:right;">${formatRowCounts(r)}</td>
        </tr>`;
      });
    });
    grandTotal += locTotal;
    html += `<div class="report-loc">
      <div class="report-loc-hdr">
        <div class="report-loc-name">${loc}</div>
        <div class="report-loc-sub">${locTotal.toFixed(1)} L equiv.</div>
      </div>
      <table class="report-table">
        <thead><tr><th>Item</th><th>Code</th><th style="text-align:right;">Count</th></tr></thead>
        <tbody>${bodyRows}</tbody>
      </table>
    </div>`;
  });

  container.innerHTML = html;
  document.getElementById('report-grand').textContent = 'GRAND TOTAL: ' + grandTotal.toFixed(1) + ' L equiv. across ' + rows.length + ' items';
}

function saveReportToHistory() {
  const rows = buildSnapshot();
  if (rows.length === 0) { alert('No counts yet — enter some counts before saving to history.'); return; }
  const now = new Date();
  const dateStr = now.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'});
  const timeStr = now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  const snap = { date: dateStr+' '+timeStr, rows };
  const hist = getHistory();
  hist.unshift(snap);
  if (hist.length > 30) hist.pop();
  saveHistory(hist);
  showToast('✅ Report saved to History!');
}

// ─── FILTER ───────────────────────────────────────────────────────────────────
function filterItems() {
  const term = document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.item-row').forEach(row => {
    const match = !term || row.dataset.name.includes(term) || (row.dataset.code||'').includes(term);
    row.classList.toggle('hidden', !match);
  });
  if(term) {
    document.querySelectorAll('.page').forEach(p => {
      const v = p.querySelectorAll('.item-row:not(.hidden)').length;
      p.style.display = v > 0 ? 'block' : 'none';
    });
  } else {
    document.querySelectorAll('.page').forEach(p => { p.style.display=''; });
  }
}

// ─── SWITCH PAGE ─────────────────────────────────────────────────────────────
function switchPage(pageId) {
  currentPage = pageId;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const pg = document.getElementById('page-'+pageId);
  if(pg) pg.classList.add('active');
  const tab = document.getElementById('tab-'+pageId);
  if(tab) tab.classList.add('active');
  document.getElementById('search').value = '';
  filterItems();
  if(pageId === 'history') renderHistory();
  if(pageId === 'report') renderReport();
}

// ─── RESET ────────────────────────────────────────────────────────────────────
function resetAll() {
  if(!confirm('Reset ALL counts to zero?')) return;
  state = {}; saveState();
  document.querySelectorAll('.count-display').forEach(d => { d.textContent='0'; d.className='count-display zero'; });
  document.querySelectorAll('.item-row').forEach(r => r.classList.remove('counted'));
  updateTotals();
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, 2200);
}

// ─── RENDER ───────────────────────────────────────────────────────────────────
function makeCounter(key, bottleSizeLiters, label) {
  const val = getVal(key); // this is a BOTTLE COUNT (e.g. 3, 3.4, 0.6) — not liters
  const dispVal = val === 0 ? '0' : trimZeros(val);
  return `
    <div class="counter-row">
      <span class="counter-label">${label}</span>
      <button class="qty-btn minus" onclick="setVal('${key}',getVal('${key}')-1)">−1</button>
      <button class="qty-btn fine" onclick="setVal('${key}',getVal('${key}')-0.2)" title="fine adjust −0.2 bottle">−.2</button>
      <div class="count-display${val===0?' zero':''}" id="disp-${key}" onclick="promptVal('${key}')">${dispVal}</div>
      <button class="qty-btn fine" onclick="setVal('${key}',getVal('${key}')+0.2)" title="fine adjust +0.2 bottle">+.2</button>
      <button class="qty-btn plus" onclick="setVal('${key}',getVal('${key}')+1)">+1</button>
    </div>`;
}

function render() {
  const tabsEl = document.getElementById('tabs');
  const pagesEl = document.getElementById('pages');
  tabsEl.innerHTML = ''; pagesEl.innerHTML = '';

  PAGES.forEach((page, i) => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (i===0?' active':'');
    tab.id = 'tab-'+page.id;
    tab.dataset.page = page.id;
    tab.textContent = page.label;
    tab.onclick = () => switchPage(page.id);
    tabsEl.appendChild(tab);

    const pageDiv = document.createElement('div');
    pageDiv.className = 'page' + (i===0?' active':'');
    pageDiv.id = 'page-'+page.id;

    Object.entries(page.sections).forEach(([catName, sec]) => {
      const section = document.createElement('div');
      section.className = 'section';
      const hdr = document.createElement('div');
      hdr.className = 'section-title';
      hdr.innerHTML = '<span>'+catName+'</span><span>'+sec.items.length+' items</span>';
      section.appendChild(hdr);

      sec.items.forEach(item => {
        const row = document.createElement('div');
        row.id = 'row-'+item.id;
        const displayName = getItemName(item);
        const displayCode = getItemCode(item);
        row.dataset.name = displayName.toLowerCase();
        row.dataset.code = (displayCode||'').toLowerCase();
        const isBlank = item.name === ''; // original placeholder slot (e.g. new keg)

        const nameBlock = isBlank
          ? `<input type="text" class="item-name-input" value="${escapeAttr(displayName)}" placeholder="New item — type name" onchange="setItemName('${item.id}', this.value)">
             <input type="text" class="item-code-input" value="${escapeAttr(displayCode)}" placeholder="code (optional)" onchange="setItemCode('${item.id}', this.value)">`
          : `<div class="item-name">${displayName}</div>
             <div class="item-code">${displayCode||'—'}</div>`;

        if(sec.type === 'liquor') {
          const v750 = getVal(item.id+'_750'); const vltr = getVal(item.id+'_ltr');
          const counted = v750 > 0 || vltr > 0;
          row.className = 'item-row' + (counted ? ' counted' : '');
          row.innerHTML = `
            ${nameBlock}
            <div class="counter-rows">
              ${makeCounter(item.id+'_750', 0.75, '750ml')}
              ${makeCounter(item.id+'_ltr', 1.0, 'Liter')}
            </div>`;
        } else if(sec.type === 'wine') {
          const v750 = getVal(item.id+'_750'); const v15 = getVal(item.id+'_15');
          const counted = v750 > 0 || v15 > 0;
          row.className = 'item-row' + (counted ? ' counted' : '');
          row.innerHTML = `
            ${nameBlock}
            <div class="counter-rows">
              ${makeCounter(item.id+'_750', 0.75, '750ml')}
              ${makeCounter(item.id+'_15', 1.5, '1.5L')}
            </div>`;
        } else if(sec.type === 'syrup') {
          const v = getVal(item.id);
          row.className = 'item-row' + (v > 0 ? ' counted' : '');
          row.innerHTML = `
            <div style="display:flex;align-items:center;gap:10px">
              <div class="item-info" style="flex:1">
                ${nameBlock}
              </div>
              <div class="beer-row">
                <button class="qty-btn minus" onclick="setVal('${item.id}',getVal('${item.id}')-0.2,0.2)">−</button>
                <div class="count-display${v===0?' zero':''}" id="disp-${item.id}" onclick="promptVal('${item.id}',0.2)">${v===0?'0':trimZeros(v)}</div>
                <button class="qty-btn plus" onclick="setVal('${item.id}',getVal('${item.id}')+0.2,0.2)">+</button>
              </div>
            </div>`;
        } else { // beer (incl. kegs)
          const v = getVal(item.id);
          row.className = 'item-row' + (v > 0 ? ' counted' : '');
          row.innerHTML = `
            <div style="display:flex;align-items:center;gap:10px">
              <div class="item-info" style="flex:1">
                ${nameBlock}
              </div>
              <div class="beer-row">
                <button class="qty-btn minus" onclick="setVal('${item.id}',getVal('${item.id}')-1,1)">−1</button>
                <input type="number" class="beer-input${v===0?' zero':''}" id="disp-${item.id}" value="${v===0?'':trimZeros(v)}" min="0" step="1" placeholder="0" onchange="setVal('${item.id}', parseFloat(this.value)||0, 1)">
                <button class="qty-btn plus" onclick="setVal('${item.id}',getVal('${item.id}')+1,1)">+1</button>
              </div>
            </div>`;
        }
        section.appendChild(row);
      });
      pageDiv.appendChild(section);
    });
    pagesEl.appendChild(pageDiv);
  });

  // Report tab (final, print-ready, sorted-by-room summary)
  const reportTab = document.createElement('div');
  reportTab.className = 'tab';
  reportTab.id = 'tab-report';
  reportTab.dataset.page = 'report';
  reportTab.textContent = '📄 Report';
  reportTab.onclick = () => switchPage('report');
  tabsEl.appendChild(reportTab);

  const reportPage = document.createElement('div');
  reportPage.className = 'page';
  reportPage.id = 'page-report';
  reportPage.innerHTML = `
    <div class="section">
      <div class="report-header">Inventory Count Report</div>
      <div class="report-date" id="report-date">—</div>
      <div class="report-actions no-print">
        <button class="btn btn-export" onclick="saveReportToHistory()">💾 Save to History</button>
        <button class="btn btn-print" onclick="window.print()">🖨 Print This Report</button>
      </div>
      <div id="report-content"></div>
      <div class="report-grand" id="report-grand"></div>
    </div>`;
  pagesEl.appendChild(reportPage);

  // History tab
  const histTab = document.createElement('div');
  histTab.className = 'tab';
  histTab.id = 'tab-history';
  histTab.dataset.page = 'history';
  histTab.textContent = '📋 History';
  histTab.onclick = () => switchPage('history');
  tabsEl.appendChild(histTab);

  const histPage = document.createElement('div');
  histPage.className = 'page';
  histPage.id = 'page-history';
  histPage.innerHTML = `
    <div class="section">
      <div class="section-title"><span>Count History</span><span>Last 30 saves</span></div>
      <div id="history-content"></div>
    </div>`;
  pagesEl.appendChild(histPage);

  updateTotals();
}

loadState();
render();
</script>
</body>
</html>
