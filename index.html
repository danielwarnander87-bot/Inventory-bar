<style>
  :root {
    --bg: #0a0a0f;
    --card: #12121a;
    --border: #1e1e2e;
    --text: #f0f0ff;
    --muted: #6060a0;

    /* FLUORESCENT PALETTE */
    --neon-green: #39ff14;
    --neon-pink: #ff2d78;
    --neon-yellow: #fff01f;
    --neon-blue: #00f5ff;
    --neon-orange: #ff6b00;
    --neon-purple: #bf00ff;
    --neon-lime: #ccff00;
    --neon-red: #ff0040;

    --tab-liquor: var(--neon-yellow);
    --tab-room2: var(--neon-pink);
    --tab-wine: var(--neon-blue);
    --tab-beer: var(--neon-green);
    --tab-syrups: var(--neon-orange);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
    font-size: 15px;
    padding-bottom: 80px;
  }

  /* HEADER */
  .header {
    background: #080810;
    border-bottom: 2px solid var(--neon-purple);
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 0 20px rgba(191,0,255,0.4);
  }
  .title {
    font-size: 20px;
    font-weight: 900;
    letter-spacing: -0.5px;
    background: linear-gradient(90deg, var(--neon-yellow), var(--neon-pink), var(--neon-blue));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle { color: var(--muted); font-size: 11px; margin-top: 1px; }
  .stats { display: flex; gap: 16px; margin-top: 8px; }
  .stat-value { font-size: 18px; font-weight: 800; color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
  .stat-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }

  /* TABS */
  .tabs {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding: 10px 12px;
    background: #080810;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 85px;
    z-index: 99;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    border: 2px solid transparent;
    background: var(--card);
    color: var(--muted);
    white-space: nowrap;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    transition: all 0.15s;
  }
  .tab[data-page="bar"].active        { background: #1a1500; border-color: var(--neon-yellow); color: var(--neon-yellow); box-shadow: 0 0 12px rgba(255,240,31,0.5); }
  .tab[data-page="room2"].active      { background: #1a0010; border-color: var(--neon-pink);   color: var(--neon-pink);   box-shadow: 0 0 12px rgba(255,45,120,0.5); }
  .tab[data-page="wine"].active       { background: #001a1a; border-color: var(--neon-blue);   color: var(--neon-blue);   box-shadow: 0 0 12px rgba(0,245,255,0.5); }
  .tab[data-page="beer"].active       { background: #001a00; border-color: var(--neon-green);  color: var(--neon-green);  box-shadow: 0 0 12px rgba(57,255,20,0.5); }
  .tab[data-page="syrups"].active     { background: #1a0a00; border-color: var(--neon-orange); color: var(--neon-orange); box-shadow: 0 0 12px rgba(255,107,0,0.5); }

  /* CONTROLS */
  .controls { padding: 10px 14px; display: flex; gap: 8px; flex-wrap: wrap; }
  .search-input {
    flex: 1; min-width: 180px;
    background: var(--card);
    border: 1px solid var(--neon-purple);
    color: var(--text);
    padding: 9px 14px;
    border-radius: 8px;
    font-size: 15px;
    outline: none;
    box-shadow: 0 0 8px rgba(191,0,255,0.2);
  }
  .search-input:focus { border-color: var(--neon-blue); box-shadow: 0 0 12px rgba(0,245,255,0.3); }
  .btn {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 9px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .btn-reset { border-color: var(--neon-red); color: var(--neon-red); }
  .btn-export { border-color: var(--neon-green); color: var(--neon-green); box-shadow: 0 0 8px rgba(57,255,20,0.2); }
  .btn-print { border-color: var(--neon-blue); color: var(--neon-blue); }

  /* PAGES */
  .page { display: none; padding: 0 14px; }
  .page.active { display: block; }

  /* SECTIONS */
  .section { margin-top: 18px; }
  .section-title {
    font-size: 11px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 6px 8px;
    border-radius: 6px;
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .section-title span:last-child { font-weight: 400; opacity: 0.6; font-size: 10px; }

  /* color the section title per page */
  .page[id="page-bar"]    .section-title { background: rgba(255,240,31,0.08); color: var(--neon-yellow); border-left: 3px solid var(--neon-yellow); }
  .page[id="page-room2"]  .section-title { background: rgba(255,45,120,0.08); color: var(--neon-pink);   border-left: 3px solid var(--neon-pink); }
  .page[id="page-wine"]   .section-title { background: rgba(0,245,255,0.08);  color: var(--neon-blue);   border-left: 3px solid var(--neon-blue); }
  .page[id="page-beer"]   .section-title { background: rgba(57,255,20,0.08);  color: var(--neon-green);  border-left: 3px solid var(--neon-green); }
  .page[id="page-syrups"] .section-title { background: rgba(255,107,0,0.08);  color: var(--neon-orange); border-left: 3px solid var(--neon-orange); }

  /* ITEM ROWS */
  .item-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--card);
    border-radius: 8px;
    margin-bottom: 3px;
    transition: background 0.1s;
  }
  .item-row.counted { background: #0d1a0d; }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-code { font-size: 10px; color: var(--muted); font-family: monospace; }

  /* COUNTERS */
  .count-controls { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .qty-btn {
    background: #1a1a2e;
    border: 1px solid var(--border);
    color: var(--text);
    width: 38px; height: 38px;
    border-radius: 8px;
    font-size: 20px;
    font-weight: 900;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    touch-action: manipulation;
    user-select: none;
    transition: all 0.1s;
  }
  .qty-btn.minus:active { background: var(--neon-red); border-color: var(--neon-red); color: #000; }
  .qty-btn.plus:active  { background: var(--neon-green); border-color: var(--neon-green); color: #000; }

  .count-display {
    width: 52px;
    text-align: center;
    font-size: 20px;
    font-weight: 900;
    background: #0a0a14;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 6px 2px;
    cursor: pointer;
    user-select: none;
    color: var(--neon-green);
    text-shadow: 0 0 8px var(--neon-green);
    transition: all 0.1s;
  }
  .count-display.zero { color: var(--muted); text-shadow: none; }

  /* PROGRESS */
  .progress-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #080810;
    border-top: 2px solid var(--neon-purple);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 12px;
    z-index: 50;
    box-shadow: 0 -4px 20px rgba(191,0,255,0.3);
  }
  .progress-text { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .progress-track { flex: 1; height: 6px; background: #1e1e2e; border-radius: 999px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(to right, var(--neon-purple), var(--neon-pink), var(--neon-yellow));
    transition: width 0.3s ease;
    box-shadow: 0 0 10px var(--neon-pink);
  }

  .hidden { display: none !important; }
  .toast {
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    background: var(--neon-green); color: #000;
    padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 800;
    z-index: 9999; pointer-events: none;
    box-shadow: 0 0 20px var(--neon-green);
    text-transform: uppercase; letter-spacing: 1px;
  }

  @media print {
    .header,.tabs,.controls,.progress-bar,.qty-btn { display:none!important; }
    .page { display:block!important; }
    body { background:white; color:#111; padding:20px; }
    .item-name,.item-code { color:#111; }
    .item-row { background:white; border-bottom:1px solid #ddd; border-radius:0; }
    .count-display { background:white; border:1px solid #ccc; color:#111; font-size:14px; width:40px; height:32px; text-shadow:none; }
    .section-title { color:#333; background:#f5f5f5!important; border-left:3px solid #333!important; }
  }
</style>
</head>

let state = {};
let currentPage = 'bar';

function loadState() { try { state = JSON.parse(localStorage.getItem('uno_bar_v4')||'{}'); } catch(e){state={};} }
function saveState() { try { localStorage.setItem('uno_bar_v4', JSON.stringify(state)); } catch(e){} }
function getCount(id) { return parseInt(state[id]||0); }
function setCount(id, val) {
  val = Math.max(0, parseInt(val)||0);
  state[id] = val;
  saveState();
  const d = document.getElementById('disp-'+id);
  if(d){ d.textContent=val; d.className='count-display'+(val===0?' zero':''); }
  const row = document.getElementById('row-'+id);
  if(row) row.className = 'item-row'+(val>0?' counted':'');
  updateTotals();
}
function updateTotals() {
  let bottles=0,counted=0,total=0;
  PAGES.forEach(p=>Object.values(p.sections).forEach(items=>items.forEach(item=>{
    total++; const c=getCount(item.id); bottles+=c; if(c>0)counted++;
  })));
  document.getElementById('total-bottles').textContent=bottles;
  document.getElementById('items-counted').textContent=counted+'/'+total;
  const pct=total>0?Math.round(counted/total*100):0;
  document.getElementById('progress-fill').style.width=pct+'%';
  document.getElementById('progress-text').textContent=counted+' of '+total+' items • '+bottles+' total';
}
function switchPage(pageId) {
  currentPage=pageId;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  const pg=document.getElementById('page-'+pageId);
  if(pg)pg.classList.add('active');
  const tab=document.getElementById('tab-'+pageId);
  if(tab)tab.classList.add('active');
  document.getElementById('search').value='';
  filterItems();
}
function filterItems() {
  const term=document.getElementById('search').value.toLowerCase();
  document.querySelectorAll('.item-row').forEach(row=>{
    const match=!term||row.dataset.name.includes(term)||row.dataset.code.includes(term);
    row.classList.toggle('hidden',!match);
  });
  if(term){
    document.querySelectorAll('.page').forEach(p=>{
      const v=p.querySelectorAll('.item-row:not(.hidden)').length;
      p.style.display=v>0?'block':'none';
    });
  } else {
    document.querySelectorAll('.page').forEach(p=>{p.style.display='';});
    switchPage(currentPage);
  }
}
function resetAll() {
  if(!confirm('Reset ALL counts?')) return;
  state={}; saveState();
  document.querySelectorAll('.count-display').forEach(d=>{d.textContent='0';d.className='count-display zero';});
  document.querySelectorAll('.item-row').forEach(r=>r.classList.remove('counted'));
  updateTotals();
}
function exportCSV() {
  let csv='Location,Category,Item Name,Code,Count\n';
  PAGES.forEach(page=>Object.entries(page.sections).forEach(([cat,items])=>items.forEach(item=>{
    csv+='"'+page.label.replace(/[^\w ]/g,'').trim()+'","'+cat+'","'+item.name+'","'+item.code+'",'+getCount(item.id)+'\n';
  })));
  try {
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url; a.download='Bar_Inventory_'+new Date().toISOString().slice(0,10)+'.csv';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('✅ Exported!');
  } catch(e){alert('Export failed. Try Safari.');}
}
function showToast(msg) {
  const t=document.createElement('div');
  t.className='toast'; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(()=>t.remove(),300);},2000);
}
function promptCount(id) {
  const val=prompt('Enter count:',getCount(id));
  if(val!==null)setCount(id,val);
}
function render() {
  const tabsEl=document.getElementById('tabs');
  const pagesEl=document.getElementById('pages');
  tabsEl.innerHTML=''; pagesEl.innerHTML='';
  PAGES.forEach((page,i)=>{
    const tab=document.createElement('div');
    tab.className='tab'+(i===0?' active':'');
    tab.id='tab-'+page.id;
    tab.dataset.page=page.id;
    tab.textContent=page.label;
    tab.onclick=()=>switchPage(page.id);
    tabsEl.appendChild(tab);
    const pageDiv=document.createElement('div');
    pageDiv.className='page'+(i===0?' active':'');
    pageDiv.id='page-'+page.id;
    Object.entries(page.sections).forEach(([catName,items])=>{
      const sec=document.createElement('div');
      sec.className='section';
      const hdr=document.createElement('div');
      hdr.className='section-title';
      hdr.innerHTML='<span>'+catName+'</span><span>'+items.length+' items</span>';
      sec.appendChild(hdr);
      items.forEach(item=>{
        const c=getCount(item.id);
        const row=document.createElement('div');
        row.className='item-row'+(c>0?' counted':'');
        row.id='row-'+item.id;
        row.dataset.name=item.name.toLowerCase();
        row.dataset.code=item.code.toLowerCase();
        row.innerHTML=`
          <div class="item-info">
            <div class="item-name">${item.name}</div>
            <div class="item-code">${item.code||'—'}</div>
          </div>
          <div class="count-controls">
            <button class="qty-btn minus" onclick="setCount('${item.id}',getCount('${item.id}')-1)">−</button>
            <div class="count-display${c===0?' zero':''}" id="disp-${item.id}" onclick="promptCount('${item.id}')">${c}</div>
            <button class="qty-btn plus" onclick="setCount('${item.id}',getCount('${item.id}')+1)">+</button>
          </div>`;
        sec.appendChild(row);
      });
      pageDiv.appendChild(sec);
    });
    pagesEl.appendChild(pageDiv);
  });
  updateTotals();
}
loadState(); render();
